<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WoW Raid Comp Generator</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<style>
  body { font-family: Arial, sans-serif; background-color: #1a1a1a; color: #f0f0f0; padding: 20px; margin: 0; }
  .container { max-width: 1200px; margin: auto; background: #242424; padding: 20px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
  h1 { text-align: center; color: #ffcc00; margin-bottom: 5px; }
  p.subtitle { text-align: center; color: #aaa; font-size: 0.9em; margin-top: 0; margin-bottom: 20px; }
  
  .form-group { display: flex; gap: 15px; margin-bottom: 20px; justify-content: center; flex-wrap: wrap; align-items: center; background: #1e1e1e; padding: 15px; border-radius: 6px; border: 1px solid #333; }
  input[type="text"], button { padding: 10px; border-radius: 4px; border: 1px solid #444; font-size: 16px; background: #333; color: white; }
  input[type="text"]:focus { outline: none; border-color: #ff9900; }
  button { background-color: #ff9900; color: #111; cursor: pointer; font-weight: bold; border: none; transition: background 0.2s; }
  button:hover { background-color: #cc7a00; }
  button:disabled { background-color: #555; color: #888; cursor: not-allowed; }
  
  .role-selectors { display: flex; gap: 15px; align-items: center; }
  .role-label { display: flex; align-items: center; gap: 6px; cursor: pointer; user-select: none; font-size: 0.95em; }
  .role-label input { width: 18px; height: 18px; cursor: pointer; }

  .checkbox-group { display: flex; align-items: center; gap: 5px; background: #333; padding: 10px 15px; border-radius: 4px; border: 1px solid #444; cursor: pointer; user-select: none; }
  .checkbox-group input { width: 18px; height: 18px; cursor: pointer; }

  .player-list { margin-bottom: 30px; display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; }
  .player-badge { background: #333; padding: 5px 10px 5px 15px; border-radius: 20px; display: flex; align-items: center; gap: 10px; font-size: 0.9em; border: 1px solid #555; }
  .delete-btn { background: #ff4444; color: white; border-radius: 50%; width: 22px; height: 22px; display: flex; align-items: center; justify-content: center; cursor: pointer; border: none; font-size: 12px; font-weight: bold; padding: 0;}
  .delete-btn:hover { background: #cc0000; }
  
  .generate-btn-container { text-align: center; margin-bottom: 30px; }
  .generate-btn-container button { width: 100%; max-width: 400px; font-size: 1.2em; padding: 15px; }

  /* 4-Column Grid Layout */
  .roles-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; padding: 15px; }
  .role-column { background: #1e1e1e; border-radius: 6px; padding: 15px; border: 1px solid #333; }
  .role-header { text-align: center; margin-top: 0; padding-bottom: 10px; border-bottom: 2px solid #444; font-size: 1.2em; display: flex; justify-content: space-between; align-items: center;}
  
  .col-Tank .role-header { color: #60a5fa; border-color: #60a5fa; }
  .col-Healer .role-header { color: #4ade80; border-color: #4ade80; }
  .col-Melee .role-header { color: #f87171; border-color: #f87171; }
  .col-Ranged .role-header { color: #c084fc; border-color: #c084fc; }

  .result-item { display: flex; align-items: center; gap: 12px; padding: 8px; margin-top: 10px; background: #2a2a2a; border-left: 4px solid #fff; border-radius: 4px; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
  .result-item.revealed { animation: pop 0.4s ease-out forwards; }
  @keyframes pop { 0% { transform: scale(0.95); background: #444; } 50% { transform: scale(1.02); } 100% { transform: scale(1); background: #2a2a2a; } }

  .spec-icon { width: 36px; height: 36px; border-radius: 4px; border: 1px solid #111; background: #111; }
  .player-info { display: flex; flex-direction: column; }
  .player-name { font-weight: bold; font-size: 1em; }
  .player-spec { font-size: 0.8em; color: #ccc; }

  .result-item.rolling { border-left-color: #ff9900; opacity: 0.8; }
  .result-item.rolling .spec-icon { animation: spin 0.6s linear infinite; }
  @keyframes spin { 100% { transform: rotate(360deg); } }

  /* SPLASH SCREEN OVERLAY */
  #splashOverlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0, 0, 0, 1); z-index: 1000;
    display: none; align-items: center; justify-content: center;
    flex-direction: column; text-align: center;
  }
  #splashContent {
    background: #1e1e1e; padding: 50px 80px; border-radius: 12px;
    box-shadow: 0 10px 40px rgba(0,0,0,0.8); border: 3px solid #444;
    display: flex; flex-direction: column; align-items: center;
    transition: all 0.2s;
  }
  #splashPlayerName { font-size: 3em; margin: 0 0 20px 0; font-weight: bold; }
  #splashIcon { width: 128px; height: 128px; border-radius: 12px; border: 2px solid #111; box-shadow: 0 4px 15px rgba(0,0,0,0.5); margin-bottom: 20px; }
  #splashSpec { font-size: 2em; color: #ccc; font-weight: bold; }
  
  .splash-rolling #splashIcon { animation: spin 0.5s linear infinite; }
  .splash-reveal { animation: splashPop 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
  @keyframes splashPop { 0% { transform: scale(0.8); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }

  @media (max-width: 900px) { .roles-grid { grid-template-columns: repeat(2, 1fr); } }
  @media (max-width: 600px) { .roles-grid { grid-template-columns: 1fr; } #splashContent { padding: 30px; } #splashPlayerName { font-size: 2em;} #splashIcon { width: 96px; height: 96px; } }

  /* Class Colors */
  .Warrior { border-color: #C69B6D; } .Paladin { border-color: #F48CBA; } .Hunter { border-color: #ABD473; }
  .Rogue { border-color: #FFF468; } .Priest { border-color: #FFFFFF; } .DeathKnight { border-color: #C41E3A; }
  .Shaman { border-color: #0070DE; } .Mage { border-color: #3FC7EB; } .Warlock { border-color: #8788EE; }
  .Monk { border-color: #00FF98; } .Druid { border-color: #FF7C0A; } .DemonHunter { border-color: #A330C9; }
  .Evoker { border-color: #33937F; }
  
  .text-Warrior { color: #C69B6D; } .text-Paladin { color: #F48CBA; } .text-Hunter { color: #ABD473; }
  .text-Rogue { color: #FFF468; } .text-Priest { color: #FFFFFF; } .text-DeathKnight { color: #C41E3A; }
  .text-Shaman { color: #0070DE; } .text-Mage { color: #3FC7EB; } .text-Warlock { color: #8788EE; }
  .text-Monk { color: #00FF98; } .text-Druid { color: #FF7C0A; } .text-DemonHunter { color: #A330C9; }
  .text-Evoker { color: #33937F; }
</style>
</head>
<body>

<div class="container">
  <h1>Raid Comp Generator</h1>
  <p class="subtitle">Semi-balanced raid comp generator.</p>
  
  <div class="form-group">
    <input type="text" id="playerName" placeholder="Enter Player Name" required onkeypress="handleEnter(event)">
    
    <div class="role-selectors" id="roleSelector">
      <label class="role-label"><input type="checkbox" value="Tank" class="role-check" checked> Tank</label>
      <label class="role-label"><input type="checkbox" value="Healer" class="role-check" checked> Healer</label>
      <label class="role-label"><input type="checkbox" value="Melee" class="role-check" checked> Melee</label>
      <label class="role-label"><input type="checkbox" value="Ranged" class="role-check" checked> Ranged</label>
    </div>
    
    <button onclick="addPlayer()" id="addBtn">Add Player</button>
    <button onclick="clearPlayers()" style="background-color: #ff4444; color: white;">Clear All</button>
    
    <label class="checkbox-group">
      <input type="checkbox" id="fastRoll"> Fast Roll
    </label>
  </div>

  <div class="player-list" id="playerList"></div>
  
  <div class="generate-btn-container">
    <button onclick="generateComp()" id="rollBtn">Roll Comp!</button>
  </div>
  
  <div class="roles-grid" id="results">
    <!-- Columns injected via JS -->
  </div>
</div>

<!-- Splash Modal -->
<div id="splashOverlay">
  <div id="splashContent">
    <h2 id="splashPlayerName">Player Name</h2>
    <img id="splashIcon" src="" alt="Spec">
    <div id="splashSpec">Rolling...</div>
  </div>
</div>

<script>
  const iconBase = "./icons/"; 
  const unknownIcon = "./icons/inv_misc_questionmark.jpg"; // Fallback placeholder icon
  
  const allSpecs = [
    { class: 'Warrior', spec: 'Protection', role: 'Tank', icon: 'ability_warrior_defensivestance' }, 
    { class: 'Warrior', spec: 'Arms', role: 'Melee', icon: 'ability_warrior_savageblow' }, 
    { class: 'Warrior', spec: 'Fury', role: 'Melee', icon: 'ability_warrior_innerrage' },
    { class: 'Paladin', spec: 'Protection', role: 'Tank', icon: 'spell_holy_devotionaura' }, 
    { class: 'Paladin', spec: 'Holy', role: 'Healer', icon: 'spell_holy_holybolt' }, 
    { class: 'Paladin', spec: 'Retribution', role: 'Melee', icon: 'spell_holy_auraoflight' },
    { class: 'Hunter', spec: 'Beast Mastery', role: 'Ranged', icon: 'ability_hunter_bestialdiscipline' }, 
    { class: 'Hunter', spec: 'Marksmanship', role: 'Ranged', icon: 'ability_hunter_focusedaim' }, 
    { class: 'Hunter', spec: 'Survival', role: 'Melee', icon: 'ability_hunter_camouflage' },
    { class: 'Rogue', spec: 'Assassination', role: 'Melee', icon: 'ability_rogue_eviscerate' }, 
    { class: 'Rogue', spec: 'Outlaw', role: 'Melee', icon: 'inv_sword_30' }, 
    { class: 'Rogue', spec: 'Subtlety', role: 'Melee', icon: 'ability_stealth' },
    { class: 'Priest', spec: 'Discipline', role: 'Healer', icon: 'spell_holy_powerwordshield' }, 
    { class: 'Priest', spec: 'Holy', role: 'Healer', icon: 'spell_holy_guardianspirit' }, 
    { class: 'Priest', spec: 'Shadow', role: 'Ranged', icon: 'spell_shadow_shadowwordpain' },
    { class: 'DeathKnight', spec: 'Blood', role: 'Tank', icon: 'spell_deathknight_bloodpresence' }, 
    { class: 'DeathKnight', spec: 'Frost', role: 'Melee', icon: 'spell_deathknight_frostpresence' }, 
    { class: 'DeathKnight', spec: 'Unholy', role: 'Melee', icon: 'spell_deathknight_unholypresence' },
    { class: 'Shaman', spec: 'Restoration', role: 'Healer', icon: 'spell_nature_magicimmunity' }, 
    { class: 'Shaman', spec: 'Elemental', role: 'Ranged', icon: 'spell_nature_lightning' }, 
    { class: 'Shaman', spec: 'Enhancement', role: 'Melee', icon: 'spell_shaman_improvedstormstrike' },
    { class: 'Mage', spec: 'Arcane', role: 'Ranged', icon: 'spell_holy_magicalsentry' }, 
    { class: 'Mage', spec: 'Fire', role: 'Ranged', icon: 'spell_fire_firebolt02' }, 
    { class: 'Mage', spec: 'Frost', role: 'Ranged', icon: 'spell_frost_frostbolt02' },
    { class: 'Warlock', spec: 'Affliction', role: 'Ranged', icon: 'spell_shadow_deathcoil' }, 
    { class: 'Warlock', spec: 'Demonology', role: 'Ranged', icon: 'spell_shadow_metamorphosis' }, 
    { class: 'Warlock', spec: 'Destruction', role: 'Ranged', icon: 'spell_shadow_rainoffire' },
    { class: 'Monk', spec: 'Brewmaster', role: 'Tank', icon: 'spell_monk_brewmaster_spec' }, 
    { class: 'Monk', spec: 'Mistweaver', role: 'Healer', icon: 'spell_monk_mistweaver_spec' }, 
    { class: 'Monk', spec: 'Windwalker', role: 'Melee', icon: 'spell_monk_windwalker_spec' },
    { class: 'Druid', spec: 'Guardian', role: 'Tank', icon: 'ability_racial_bearform' }, 
    { class: 'Druid', spec: 'Restoration', role: 'Healer', icon: 'spell_nature_healingtouch' }, 
    { class: 'Druid', spec: 'Balance', role: 'Ranged', icon: 'spell_nature_starfall' }, 
    { class: 'Druid', spec: 'Feral', role: 'Melee', icon: 'ability_druid_catform' },
    { class: 'DemonHunter', spec: 'Vengeance', role: 'Tank', icon: 'ability_demonhunter_spectank' }, 
    { class: 'DemonHunter', spec: 'Havoc', role: 'Melee', icon: 'ability_demonhunter_specdps' }, 
    { class: 'DemonHunter', spec: 'Devourer', role: 'Ranged', icon: 'spell_shadow_demonicempathy' },
    { class: 'Evoker', spec: 'Preservation', role: 'Healer', icon: 'classicon_evoker_preservation' }, 
    { class: 'Evoker', spec: 'Devastation', role: 'Ranged', icon: 'classicon_evoker_devastation' }, 
    { class: 'Evoker', spec: 'Augmentation', role: 'Ranged', icon: 'classicon_evoker_augmentation' }
  ];

  let players = [];
  let isGenerating = false;

  // SAFE LOAD LocalStorage
  document.addEventListener("DOMContentLoaded", () => {
    try {
      const saved = localStorage.getItem('wowRaidPlayers');
      if (saved) {
        players = JSON.parse(saved);
        renderPlayers();
      }
    } catch (e) {
      console.error("Could not load saved players.", e);
      players = [];
    }
  });

  function saveToStorage() {
    localStorage.setItem('wowRaidPlayers', JSON.stringify(players));
  }

  function handleEnter(e) { if (e.key === 'Enter') addPlayer(); }

  function addPlayer() {
    if (isGenerating) return;
    const nameInput = document.getElementById('playerName');
    const roleChecks = document.querySelectorAll('.role-check:checked');
    if (!nameInput.value.trim()) return;
    
    // If no boxes checked, default to ALL roles checked (Any Role)
    let roles = roleChecks.length > 0 
      ? Array.from(roleChecks).map(cb => cb.value) 
      : ['Tank', 'Healer', 'Melee', 'Ranged'];
    
    players.push({ name: nameInput.value.trim(), preferredRoles: roles });
    
    // Reset Form Elements
    nameInput.value = '';
    document.querySelectorAll('.role-check').forEach(cb => cb.checked = true); // Reset checkboxes to checked state
    
    saveToStorage();
    renderPlayers();
    nameInput.focus();
  }

  function removePlayer(index) {
    if (isGenerating) return;
    players.splice(index, 1);
    saveToStorage();
    renderPlayers();
  }

  function clearPlayers() {
    if (isGenerating) return;
    if (confirm("Are you sure you want to clear all players?")) {
      players = [];
      saveToStorage();
      renderPlayers();
      document.getElementById('results').innerHTML = '';
    }
  }

  function renderPlayers() {
    const list = document.getElementById('playerList');
    list.innerHTML = players.map((p, i) => {
      // Human-readable format for preferences tag
      let roleDisplay = p.preferredRoles.length === 4 ? 'Any' : p.preferredRoles.join(', ');
      return `
        <div class="player-badge">
          <span><b>${p.name}</b> <span style="color:#aaa; font-size:0.85em;">(${roleDisplay})</span></span>
          <button class="delete-btn" onclick="removePlayer(${i})">✕</button>
        </div>
      `;
    }).join('');
  }

  function shuffle(array) {
    let result = [...array];
    for (let i = result.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [result[i], result[j]] = [result[j], result[i]];
    }
    return result;
  }

  function saveImage() {
    const container = document.getElementById('results');
    html2canvas(container, { backgroundColor: '#1a1a1a', useCORS: true, allowTaint: true }).then(canvas => {
      const link = document.createElement('a');
      link.download = 'wow-raid-comp.png';
      link.href = canvas.toDataURL("image/png");
      link.click();
    });
  }

async function generateComp() {
    if (players.length === 0) return alert("Add some players first!");
    if (isGenerating) return;
    
    isGenerating = true;
    document.getElementById('rollBtn').disabled = true;
    document.getElementById('addBtn').disabled = true;
    const isFast = document.getElementById('fastRoll').checked;
    
    // --- 1. DISTRIBUTION MATH LOGIC ---
    let targetTanks = Math.min(2, players.length);
    let n = players.length;
    let targetHealers = 0;

    // Dynamic Healer Thresholds
    if (n <= 10) {
      targetHealers = Math.min(2, n); // Hard cap 2 (unless less than 2 players exist)
    } else if (n >= 11 && n <= 14) {
      targetHealers = Math.random() > 0.5 ? 2 : 3; // 50/50 chance for 2 or 3
    } else if (n === 15) {
      targetHealers = 3; // Hard cap 3
    } else if (n >= 16 && n <= 19) {
      targetHealers = Math.random() > 0.5 ? 3 : 4; // 50/50 chance for 3 or 4
    } else if (n === 20) {
      targetHealers = 4; // Hard cap 4
    } else if (n >= 21 && n <= 24) {
      targetHealers = Math.random() > 0.5 ? 4 : 5; // 50/50 chance for 4 or 5
    } else if (n === 25) {
      targetHealers = 5; // Hard cap 5
    } else if (n >= 26 && n <= 29) {
      targetHealers = Math.random() > 0.5 ? 5 : 6; // 50/50 chance for 5 or 6
    } else {
      targetHealers = 6; // Hard cap 6 for 30+ players
    }

    let targetDps = players.length - targetTanks - targetHealers;

    // Define strict minimums to ensure we don't end up with 0 or 1
    let minMelee = Math.max(2, Math.floor(targetDps / 3));
    let minRanged = Math.max(2, Math.floor(targetDps / 3));
    
    // Create "Buckets" for roles
    let buckets = { 
      Tank: targetTanks, 
      Healer: targetHealers, 
      Melee: minMelee, 
      Ranged: minRanged, 
      Flex: targetDps - (minMelee + minRanged) 
    };

    let assignedRoles = [];
    let unassignedPlayers = shuffle([...players]);

    // Fill buckets based on player preferences
    unassignedPlayers.forEach(p => {
      const canPlay = (role) => p.preferredRoles.includes(role);
      
      // Try to find a bucket the player wants that still has room
      let desiredRoles = ['Tank', 'Healer', 'Melee', 'Ranged'].filter(r => canPlay(r) && buckets[r] > 0);
      
      if (desiredRoles.length > 0) {
        let chosen = desiredRoles[0]; // Take the first one they want
        buckets[chosen]--;
        assignedRoles.push({ player: p, role: chosen });
      } else {
        // No room or no preference, put in Flex bucket
        buckets.Flex--;
        assignedRoles.push({ player: p, role: 'Flex' });
      }
    });

    // Now resolve 'Flex' players into Melee or Ranged if those buckets need filling
    assignedRoles.forEach(item => {
      if (item.role === 'Flex') {
        if (buckets.Melee > 0) { item.role = 'Melee'; buckets.Melee--; }
        else if (buckets.Ranged > 0) { item.role = 'Ranged'; buckets.Ranged--; }
        else { item.role = Math.random() > 0.5 ? 'Melee' : 'Ranged'; }
      }
    });

    let finalComp = [];
    let unrepresentedClasses = new Set([...new Set(allSpecs.map(s => s.class))]);
    
    // Sort roles to ensure Tanks/Healers get assigned first
    const rolePriority = { 'Tank': 1, 'Healer': 2, 'Ranged': 3, 'Melee': 4 };
    assignedRoles.sort((a, b) => rolePriority[a.role] - rolePriority[b.role]);

    // --- 2. ASSIGN SPECS USING UNIFIED BUFFER & WEIGHT SYSTEM ---
    assignedRoles.forEach((item, index) => {
      let validSpecs = allSpecs.filter(s => s.role === item.role);
      
      // Calculate "Panic Mode" Buffer
      // How many players left to assign minus how many unique classes we still need
      let remainingSlots = assignedRoles.length - index;
      let buffer = remainingSlots - unrepresentedClasses.size;
      let unusedClassSpecs = validSpecs.filter(s => unrepresentedClasses.has(s.class));
      
      // If we are out of buffer space, we MUST force unrepresented classes to meet the 13-class quota
      if (buffer <= 0 && unusedClassSpecs.length > 0) {
        validSpecs = unusedClassSpecs;
      }

      // Calculate weights for all valid specs
      let weightedSpecs = validSpecs.map(spec => {
        let isUnrepresented = unrepresentedClasses.has(spec.class);
        let classCount = finalComp.filter(fc => fc.class === spec.class).length;
        let specCount = finalComp.filter(fc => fc.spec === spec.spec).length;

        let weight = 0;
        if (isUnrepresented) {
          weight = 100; // Base weight for grabbing new classes
        } else {
          // It's a duplicate! Apply exponential decay.
          // Tanks and Healers get harsher penalties than DPS.
          let classDecay = (item.role === 'Tank' || item.role === 'Healer') ? 0.15 : 0.25;
          let specDecay = (item.role === 'Tank' || item.role === 'Healer') ? 0.05 : 0.10;

          let classWeight = Math.pow(classDecay, classCount);
          let specWeight = Math.pow(specDecay, specCount);
          
          weight = 100 * classWeight * specWeight;
        }
        return { spec, weight };
      });

      // Spin the weighted random wheel
      let totalWeight = weightedSpecs.reduce((sum, s) => sum + s.weight, 0);
      let random = Math.random() * totalWeight;
      let chosenSpec;

      for (let s of weightedSpecs) {
        if (random < s.weight) { chosenSpec = s.spec; break; }
        random -= s.weight;
      }
      
      // Safety fallback
      if (!chosenSpec) chosenSpec = weightedSpecs[0].spec;
      
      unrepresentedClasses.delete(chosenSpec.class);
      finalComp.push({ ...item.player, ...chosenSpec, role: item.role });
    });

    const displayOrder = { 'Tank': 1, 'Healer': 2, 'Melee': 3, 'Ranged': 4 };
    finalComp.sort((a, b) => displayOrder[a.role] - displayOrder[b.role]);

    // --- 3. THEATRICAL ANIMATION LOGIC ---
    let displayComp = finalComp.map(p => ({
      name: p.name, role: p.role, class: 'Rolling', spec: 'Rolling', icon: '', isRolling: true, justRevealed: false
    }));
    renderResults(displayComp);
    
    let indicesToReveal = shuffle(Array.from(Array(finalComp.length).keys()));

    if (isFast) {
      for (let i of indicesToReveal) {
        displayComp.forEach(p => p.justRevealed = false);
        displayComp[i] = { ...finalComp[i], isRolling: false, justRevealed: true };
        renderResults(displayComp);
        await new Promise(r => setTimeout(r, 100));
      }
    } else {
      const overlay = document.getElementById('splashOverlay');
      const content = document.getElementById('splashContent');
      const sName = document.getElementById('splashPlayerName');
      const sIcon = document.getElementById('splashIcon');
      const sSpec = document.getElementById('splashSpec');
      
      overlay.style.display = 'flex';

      for (let i of indicesToReveal) {
        let p = finalComp[i];
        
        content.className = '';
        content.style.borderColor = '#444';
        sName.innerText = p.name;
        sName.className = '';
        sIcon.src = unknownIcon;
        sIcon.parentElement.classList.add('splash-rolling');
        sSpec.innerText = "Rolling...";
        sSpec.className = '';
        
        await new Promise(r => setTimeout(r, 500));

        sIcon.parentElement.classList.remove('splash-rolling');
        content.classList.add('splash-reveal');
        
        content.className = `splash-reveal ${p.class}`; 
        sIcon.src = `${iconBase}${p.icon}.jpg`;
        sName.className = `text-${p.class}`;
        sSpec.innerText = `${p.spec} ${p.class}`;
        sSpec.className = `text-${p.class}`;

        displayComp.forEach(p => p.justRevealed = false);
        displayComp[i] = { ...p, isRolling: false, justRevealed: true };
        renderResults(displayComp);

        await new Promise(r => setTimeout(r, 1200));
      }
      overlay.style.display = 'none';
    }

    displayComp.forEach(p => p.justRevealed = false);
    renderResults(displayComp);
    
    isGenerating = false;
    document.getElementById('rollBtn').disabled = false;
    document.getElementById('addBtn').disabled = false;

    if (!document.getElementById('saveBtn')) {
      const btn = document.createElement('button');
      btn.id = 'saveBtn';
      btn.innerText = "Save Screenshot";
      btn.style.marginLeft = "10px";
      btn.style.backgroundColor = "#4ade80";
      btn.onclick = saveImage;
      document.querySelector('.generate-btn-container').appendChild(btn);
    }
  }

  function renderResults(displayPlayers) {
    const resultsDiv = document.getElementById('results');
    const columns = ['Tank', 'Healer', 'Melee', 'Ranged'];
    
    let html = '';
    columns.forEach(role => {
      let rolePlayers = displayPlayers.filter(p => p.role === role);
      html += `
        <div class="role-column col-${role}">
          <h2 class="role-header">${role} <span>${rolePlayers.length}</span></h2>
          <div class="role-items">
            ${rolePlayers.map(p => {
              const iconUrl = p.isRolling ? unknownIcon : `${iconBase}${p.icon}.jpg`;
              let containerClass = p.isRolling ? 'rolling' : p.class;
              if (p.justRevealed) containerClass += ' revealed';
              
              const textColorClass = p.isRolling ? '' : `text-${p.class}`;
              const specText = p.isRolling ? '...' : `${p.spec} ${p.class}`;

              return `
                <div class="result-item ${containerClass}">
                  <img src="${iconUrl}" alt="${p.spec}" class="spec-icon">
                  <div class="player-info">
                    <span class="player-name ${textColorClass}">${p.name}</span>
                    <span class="player-spec">${specText}</span>
                  </div>
                </div>
              `;
            }).join('')}
            ${rolePlayers.length === 0 ? '<div style="color: #666; text-align: center; padding: 20px 0; font-size: 0.9em;">None</div>' : ''}
          </div>
        </div>
      `;
    });
    resultsDiv.innerHTML = html;
  }
</script>
</body>
</html>
